{{- if .Values.clusterReference.render }}
{{- $id := .Values.clusterReference.id -}}
{{- $ns := printf "%s%s" .Values.cluster.namespacePrefix $id -}}
{{- $sc := index .Values.cluster.sizeClasses .Values.clusterReference.sizeClass -}}
{{- $port := .Values.cluster.sparkConnectPort | int -}}
{{- $csi := .Values.cluster.csi -}}
# =====================================================================================================
# REFERENCE ONLY — the exact per-cluster object graph the GATEWAY applies at runtime for cluster
# "{{ $id }}". `helm install` does NOT create these (clusterReference.render defaults to false); this
# template exists so operators can render and audit the precise, fully-hardened shape:
#
#   helm template weft deploy/helm/weft \
#     --set clusterReference.render=true \
#     --set clusterReference.id={{ $id }} \
#     --set clusterReference.sizeClass={{ .Values.clusterReference.sizeClass }} \
#     -s templates/cluster-reference.yaml
#
# Every pod here: runAsNonRoot, readOnlyRootFilesystem, drop ALL caps, seccomp RuntimeDefault,
# automountServiceAccountToken=false. The namespace enforces the restricted Pod Security Standard.
# =====================================================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
    weft.io/cluster-id: {{ $id | quote }}
    pod-security.kubernetes.io/enforce: {{ .Values.cluster.podSecurityStandard }}
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: {{ .Values.cluster.podSecurityStandard }}
    pod-security.kubernetes.io/audit: {{ .Values.cluster.podSecurityStandard }}
---
# Per-cluster workload identity (IRSA), with NO token auto-mounted into pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weft-cluster
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.cluster.serviceAccount.irsaRoleArn | quote }}
automountServiceAccountToken: false
---
# The gateway grants ITSELF management of this namespace only — scoping its workload RBAC per cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: weft-gateway-manage
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "weft.clusterManageRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "weft.gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: weft-cluster-quota
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
spec:
  hard:
    requests.cpu: {{ .Values.cluster.resourceQuota.requestsCpu | quote }}
    requests.memory: {{ .Values.cluster.resourceQuota.requestsMemory | quote }}
    limits.cpu: {{ .Values.cluster.resourceQuota.limitsCpu | quote }}
    limits.memory: {{ .Values.cluster.resourceQuota.limitsMemory | quote }}
    pods: {{ .Values.cluster.resourceQuota.pods | quote }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: weft-cluster-limits
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
spec:
  limits:
    - type: Container
      default:
        cpu: {{ .Values.cluster.limitRange.defaultCpu | quote }}
        memory: {{ .Values.cluster.limitRange.defaultMemory | quote }}
      defaultRequest:
        cpu: {{ .Values.cluster.limitRange.defaultRequestCpu | quote }}
        memory: {{ .Values.cluster.limitRange.defaultRequestMemory | quote }}
      max:
        cpu: {{ .Values.cluster.limitRange.maxCpu | quote }}
        memory: {{ .Values.cluster.limitRange.maxMemory | quote }}
---
# Default-deny everything.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
# Narrow allowlist: ingress from the gateway namespace on the Spark Connect port; egress to DNS,
# S3, Glue, the Hive Metastore, and within the namespace (driver <-> worker).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weft-cluster-allow
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ $port }}
          protocol: TCP
    # Intra-namespace (driver <-> workers).
    - from:
        - podSelector: {}
  egress:
    # DNS (CoreDNS) only.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.cluster.egress.dnsNamespace }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Intra-namespace.
    - to:
        - podSelector: {}
    {{- if .Values.cluster.egress.s3Cidrs }}
    # S3 (object store).
    - to:
        {{- range .Values.cluster.egress.s3Cidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
    {{- end }}
    {{- if .Values.cluster.egress.glueCidrs }}
    # AWS Glue Data Catalog.
    - to:
        {{- range .Values.cluster.egress.glueCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
    {{- end }}
    {{- if .Values.cluster.egress.hmsCidrs }}
    # Hive Metastore.
    - to:
        {{- range .Values.cluster.egress.hmsCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: {{ .Values.cluster.egress.hmsPort }}
          protocol: TCP
    {{- end }}
    {{- if .Values.cluster.egress.extraCidrs }}
    - to:
        {{- range .Values.cluster.egress.extraCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
    {{- end }}
{{- if $csi.enabled }}
---
# Secrets Store CSI — catalog credentials from AWS Secrets Manager, synced to a Secret so it can be
# mounted at mode {{ $csi.fileMode }} (the CSI mount itself drives the sync).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $csi.secretProviderClassName }}
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
spec:
  provider: {{ $csi.provider }}
  parameters:
    objects: |
      - objectName: {{ $csi.secretArn | quote }}
        objectType: secretsmanager
        objectAlias: {{ $csi.fileName | quote }}
  secretObjects:
    - secretName: {{ $csi.secretProviderClassName }}
      type: Opaque
      data:
        - objectName: {{ $csi.fileName | quote }}
          key: {{ $csi.fileName | quote }}
{{- end }}
---
# Spark Connect driver.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weft-driver
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
    weft.io/role: driver
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "weft.selectorLabels" . | nindent 6 }}
      weft.io/role: driver
  template:
    metadata:
      labels:
        {{- include "weft.labels" . | nindent 8 }}
        app.kubernetes.io/component: cluster
        weft.io/role: driver
    spec:
      serviceAccountName: weft-cluster
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: connect-server
          image: {{ include "weft.cluster.connectImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["weft"]
          args: ["spark", "server", "--port", "{{ $port }}"]
          ports:
            - name: spark
              containerPort: {{ $port }}
              protocol: TCP
          env:
            - name: AWS_REGION
              value: {{ .Values.region | quote }}
            - name: HOME
              value: /tmp
            - name: WEFT_CATALOG_CONF
              value: {{ printf "%s/%s" $csi.mountPath $csi.fileName | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml $sc.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: spill
              mountPath: /var/weft/spill
            {{- if $csi.enabled }}
            - name: catalog-creds
              mountPath: {{ $csi.mountPath }}
              readOnly: true
            - name: csi-secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: spill
          emptyDir: {}
        {{- if $csi.enabled }}
        # Mode {{ $csi.fileMode }} (= decimal 256) on the catalog credential file.
        - name: catalog-creds
          secret:
            secretName: {{ $csi.secretProviderClassName }}
            defaultMode: 256
        - name: csi-secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ $csi.secretProviderClassName }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: weft-driver
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
    weft.io/role: driver
spec:
  type: ClusterIP
  selector:
    {{- include "weft.selectorLabels" . | nindent 4 }}
    weft.io/role: driver
  ports:
    - name: spark
      port: {{ $port }}
      targetPort: spark
      protocol: TCP
---
# Headless service fronting the worker StatefulSet (Arrow Flight shuffle).
apiVersion: v1
kind: Service
metadata:
  name: weft-worker
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
    weft.io/role: worker
spec:
  clusterIP: None
  selector:
    {{- include "weft.selectorLabels" . | nindent 4 }}
    weft.io/role: worker
  ports:
    - name: flight
      port: 8815
      targetPort: flight
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weft-worker
  namespace: {{ $ns }}
  labels:
    {{- include "weft.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
    weft.io/role: worker
spec:
  serviceName: weft-worker
  replicas: {{ $sc.workerReplicas }}
  selector:
    matchLabels:
      {{- include "weft.selectorLabels" . | nindent 6 }}
      weft.io/role: worker
  template:
    metadata:
      labels:
        {{- include "weft.labels" . | nindent 8 }}
        app.kubernetes.io/component: cluster
        weft.io/role: worker
    spec:
      serviceAccountName: weft-cluster
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: {{ include "weft.cluster.workerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["weft"]
          args: ["worker", "--port", "8815"]
          ports:
            - name: flight
              containerPort: 8815
              protocol: TCP
          env:
            - name: AWS_REGION
              value: {{ .Values.region | quote }}
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml $sc.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: spill
              mountPath: /var/weft/spill
      volumes:
        - name: tmp
          emptyDir: {}
        - name: spill
          emptyDir: {}
{{- end }}
