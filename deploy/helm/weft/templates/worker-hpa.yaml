{{- if .Values.worker.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: weft-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weft-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weft-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: weft-worker
  template:
    metadata:
      labels:
        app: weft-worker
    spec:
      containers:
        - name: worker
          image: {{ .Values.worker.image }}
          args: ["worker", "--port", "{{ .Values.worker.port }}"]
          ports:
            - containerPort: {{ .Values.worker.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: weft-worker
spec:
  clusterIP: None
  selector:
    app: weft-worker
  ports:
    - port: {{ .Values.worker.port }}
      targetPort: {{ .Values.worker.port }}
