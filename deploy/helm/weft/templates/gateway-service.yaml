apiVersion: v1
kind: Service
metadata:
  name: {{ include "weft.gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
  {{- with .Values.gateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "weft.gateway.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
