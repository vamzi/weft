{{- /*
JWT signing key handling.

Production: set gateway.jwt.existingSecret to a Secret you created out-of-band — this chart renders
NOTHING here and the Deployment references that Secret via secretKeyRef. The signing key never lives
in the chart, in values.yaml, or in the release manifest.

Break-glass: pass `--set-string gateway.jwt.value=...` at install time (never commit it). Only then
does this template materialise a Secret, so the value is supplied on the CLI, not stored in source.
*/ -}}
{{- if and (not .Values.gateway.jwt.existingSecret) .Values.gateway.jwt.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "weft.gateway.jwtSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.gateway.jwt.secretKey }}: {{ .Values.gateway.jwt.value | quote }}
{{- end }}
