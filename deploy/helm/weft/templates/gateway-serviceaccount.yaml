apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "weft.gateway.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
  annotations:
    # IRSA: the gateway assumes this role for S3 (workspace), the control-plane store, and the
    # AWS Secrets Manager secret it references from each cluster's SecretProviderClass.
    eks.amazonaws.com/role-arn: {{ .Values.gateway.serviceAccount.irsaRoleArn | quote }}
    {{- with .Values.gateway.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
# The gateway DOES need its projected token (it calls the API server via kubectl), so the token is
# mounted at the pod level. Per-cluster pods, by contrast, set automountServiceAccountToken: false.
automountServiceAccountToken: true
