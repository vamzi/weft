{{- if .Values.admissionPolicy.enabled }}
# =====================================================================================================
# ValidatingAdmissionPolicy — pin the gateway to the `weft-cl-` namespace prefix.
#
# RBAC can grant the gateway create/delete on Namespaces but cannot constrain the NAME on CREATE.
# This policy closes that gap: requests from the gateway ServiceAccount may only create or delete
# namespaces whose name starts with the configured prefix. Every other principal (cluster admins,
# CI, etc.) is unaffected because the matchCondition scopes evaluation to the gateway SA alone.
#
# Requires Kubernetes >= 1.30 (admissionregistration.k8s.io/v1 GA).
# =====================================================================================================
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "weft.fullname" . }}-namespace-prefix
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
spec:
  failurePolicy: {{ .Values.admissionPolicy.failurePolicy }}
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "DELETE"]
        resources: ["namespaces"]
  # Only evaluate requests made by the gateway ServiceAccount; leave everyone else alone.
  matchConditions:
    - name: only-weft-gateway-sa
      expression: >-
        request.userInfo.username == '{{ include "weft.gateway.saUsername" . }}'
  validations:
    # On CREATE `object` is set; on DELETE only `oldObject` is. Cover both.
    - expression: >-
        (object != null ? object : oldObject).metadata.name.startsWith('{{ .Values.admissionPolicy.namespacePrefix }}')
      reason: Forbidden
      messageExpression: >-
        'weft-gateway may only create or delete namespaces prefixed with "{{ .Values.admissionPolicy.namespacePrefix }}"; got: ' + (object != null ? object : oldObject).metadata.name
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "weft.fullname" . }}-namespace-prefix
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
spec:
  policyName: {{ include "weft.fullname" . }}-namespace-prefix
  validationActions: ["Deny"]
{{- end }}
