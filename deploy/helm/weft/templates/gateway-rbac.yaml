{{- if .Values.rbac.create }}
# =====================================================================================================
# Gateway RBAC — least privilege.
#
# Security model:
#   * The gateway has a STANDING grant only over Namespaces (cluster-scoped, unavoidable) plus the
#     minimum needed to BOOTSTRAP a new namespace: create RoleBindings/ResourceQuotas/LimitRanges and
#     `bind` exactly one ClusterRole (weft-...-cluster-manage). The admission policy pins which
#     namespace NAMES it may create/delete (weft-cl-*); RBAC cannot express a name prefix on CREATE.
#   * It has NO standing access to workload objects in any namespace, and crucially NO get/list/watch
#     on Secrets anywhere. When it provisions a cluster it creates a RoleBinding in that namespace
#     granting ITSELF the cluster-manage ClusterRole — scoping Deployment/Service/etc. management to
#     exactly the namespaces it created. (See examples/cluster-namespace.yaml.)
#   * `bind` is restricted via resourceNames to the cluster-manage role, so the gateway can never
#     escalate to admin/cluster-admin even though it can create RoleBindings.
# =====================================================================================================
---
# Standing grant: Namespaces + namespace bootstrap. No Secrets. No workload objects.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "weft.fullname" . }}-namespaces
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
rules:
  # Create/delete cluster namespaces (name prefix enforced by the ValidatingAdmissionPolicy).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Bootstrap a freshly-created namespace before the per-namespace self-grant exists.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Allow creating RoleBindings that reference ONLY the cluster-manage role — escalation guard.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["bind"]
    resourceNames:
      - {{ include "weft.clusterManageRoleName" . }}
---
# The role the gateway grants ITSELF inside each cluster namespace (scoped via a per-ns RoleBinding).
# This is the full set of namespaced objects the gateway manages for a cluster. Notably: NO secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "weft.clusterManageRoleName" . }}
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "serviceaccounts"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Secrets Store CSI: the gateway stamps a SecretProviderClass per namespace for catalog creds.
  - apiGroups: ["secrets-store.csi.x-k8s.io"]
    resources: ["secretproviderclasses"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Read-only pod visibility for status/troubleshooting + event reporting back to the UI.
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "get", "list", "watch", "patch"]
  # NB: intentionally NO rule granting get/list/watch on `secrets` — anywhere.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "weft.fullname" . }}-namespaces
  labels:
    {{- include "weft.gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "weft.fullname" . }}-namespaces
subjects:
  - kind: ServiceAccount
    name: {{ include "weft.gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
