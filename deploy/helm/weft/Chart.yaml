apiVersion: v2
name: weft
description: >-
  Weft self-hosted data platform: control plane (gateway, cluster-manager operator, scheduler) +
  the WeftCluster CRD, IRSA ServiceAccounts, HPAs, and NetworkPolicies. Compute clusters are
  materialized by the operator from WeftCluster resources, not by static chart templates.
type: application
version: 0.0.0
appVersion: "0.0.0"
