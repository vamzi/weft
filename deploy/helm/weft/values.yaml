# values.yaml — Weft control-plane gateway (secure Kubernetes redesign).
#
# The gateway is the only public entrypoint. It provisions per-user compute "clusters" at runtime
# by applying hardened manifests with kubectl (in-cluster credentials). It therefore needs *scoped*
# RBAC — never cluster-wide get/list on Secrets — plus a ValidatingAdmissionPolicy that pins the
# namespaces it may create/delete to the `weft-cl-` prefix.
#
# Sections:
#   * nameOverride / fullnameOverride / region  — chart-wide knobs
#   * image                                      — registry + pull policy shared by all images
#   * gateway                                    — the control-plane Deployment, SA, RBAC, Service
#   * rbac / admissionPolicy                     — the security envelope around the gateway
#   * cluster                                    — defaults the gateway stamps onto each cluster it
#                                                  provisions at runtime (drives the reference template)
#   * clusterReference                           — toggle to `helm template -s` the reference cluster

# -- Override the chart name used in resource names (defaults to the chart name, "weft").
nameOverride: ""
# -- Fully override the generated resource-name prefix.
fullnameOverride: ""

# -- AWS region for the control plane and every provisioned cluster.
region: us-west-2

image:
  # -- Default registry prepended to every image repository. ECR is the platform default.
  registry: "123456789012.dkr.ecr.us-west-2.amazonaws.com"
  # -- imagePullPolicy applied to all containers.
  pullPolicy: IfNotPresent
  # -- Image pull secrets (usually unnecessary with ECR + IRSA / node role).
  pullSecrets: []

gateway:
  # -- Number of gateway replicas. The gateway is stateless (state lives in S3/DDB/RDS).
  replicaCount: 2

  image:
    # -- Gateway image repository (appended to image.registry).
    repository: weft/gateway
    # -- Image tag. Defaults to Chart.appVersion when empty.
    tag: ""

  # kubectl must be present in the pod so the gateway can apply per-cluster manifests. An init
  # container stages the binary into a shared emptyDir so the gateway image itself stays minimal.
  kubectl:
    # -- Stage kubectl via an init container. Disable if the gateway image already bundles kubectl.
    enabled: true
    image:
      registry: docker.io
      repository: bitnami/kubectl
      tag: "1.30"

  service:
    # -- Service type. Front this with an Ingress/Gateway API resource managed outside this chart.
    type: ClusterIP
    # -- Service port.
    port: 8080
    annotations: {}

  # -- Container port the axum server binds (WEFT_GATEWAY_ADDR=0.0.0.0:<port>).
  containerPort: 8080

  serviceAccount:
    # -- Name override for the gateway ServiceAccount (defaults to "<release>-weft-gateway").
    name: ""
    # -- Extra annotations merged onto the SA (the IRSA annotation below is added automatically).
    annotations: {}
    # -- IRSA role the gateway assumes: S3 workspace, control-plane store, Secrets Manager (for the
    #    SecretProviderClass it stamps onto clusters). Scope this role tightly in IAM.
    irsaRoleArn: "arn:aws:iam::123456789012:role/weft-gateway"

  jwt:
    # -- Name of a PRE-CREATED Secret holding the JWT signing key. REQUIRED in production.
    #    The chart never inlines this value. Create it out-of-band, e.g.:
    #      kubectl -n <ns> create secret generic weft-gateway-jwt \
    #        --from-literal=jwt-secret="$(openssl rand -hex 32)"
    existingSecret: ""
    # -- Key within the Secret that holds the signing key.
    secretKey: jwt-secret
    # -- BREAK-GLASS ONLY: inline value injected via `--set-string gateway.jwt.value=...`.
    #    NEVER commit a real value into values.yaml. Leave empty in source control.
    value: ""

  admin:
    # -- Bootstrap local admin username (break-glass; SSO layers on top).
    user: admin
    # -- Optional key in the JWT existingSecret holding the bootstrap admin password.
    #    Omitted from the pod env when the key is absent.
    passwordSecretKey: admin-password

  config:
    # -- S3 bucket/prefix for user workspaces (notebooks, saved queries, results).
    workspaceS3: "s3://weft-workspace"
    # -- Control-plane metadata store (DynamoDB table). Leave empty for RDS-backed builds.
    ddbTable: "weft-control-plane"
    # -- Namespace name prefix for provisioned clusters. MUST equal admissionPolicy.namespacePrefix.
    clusterNamespacePrefix: "weft-cl-"
    # -- Idle seconds before the gateway tears a cluster down.
    clusterIdleSecs: 1800
    # -- Extra environment variables (list of {name,value} / {name,valueFrom}).
    extraEnv: []

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Pod-level hardening (restricted Pod Security Standard).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  # Container-level hardening.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

rbac:
  # -- Create the gateway ClusterRoles + bindings. Disable to manage RBAC externally.
  create: true
  # -- Name of the "cluster-manage" ClusterRole the gateway grants itself, per namespace, at runtime.
  #    Defaults to "<release>-weft-cluster-manage".
  clusterManageRoleName: ""

admissionPolicy:
  # -- Install the ValidatingAdmissionPolicy that pins gateway-created/deleted namespaces to a prefix.
  #    Requires Kubernetes >= 1.30 (admissionregistration.k8s.io/v1).
  enabled: true
  # -- Namespace prefix the gateway is allowed to create/delete. MUST match config.clusterNamespacePrefix.
  namespacePrefix: "weft-cl-"
  # -- Fail closed if the policy cannot be evaluated.
  failurePolicy: Fail

# ---------------------------------------------------------------------------------------------------
# Per-cluster defaults. These describe the objects the GATEWAY stamps onto each `weft-cl-<id>`
# namespace at runtime — they are NOT applied by `helm install`. They drive the reference template
# (templates/cluster-reference.yaml, rendered only when clusterReference.render=true) and document
# the exact shape, with all hardening, so operators can audit it.
# ---------------------------------------------------------------------------------------------------
cluster:
  # -- Namespace name prefix (kept in sync with the admission policy + gateway config).
  namespacePrefix: "weft-cl-"
  # -- Pod Security Standard enforced via the namespace label pod-security.kubernetes.io/enforce.
  podSecurityStandard: restricted
  # -- Spark Connect port the cluster driver listens on; the gateway dials sc://<svc>:<port>.
  sparkConnectPort: 50051

  image:
    connectServer:
      # -- Spark Connect driver image (`weft spark server`).
      repository: weft/connect-server
      tag: ""
    worker:
      # -- Arrow Flight worker image (`weft worker`).
      repository: weft/worker
      tag: ""

  serviceAccount:
    # -- IRSA role per-cluster pods assume. Scope to exactly the catalog/data the tenant may read.
    irsaRoleArn: "arn:aws:iam::123456789012:role/weft-cluster"

  # default-deny NetworkPolicy + a narrow egress allowlist.
  egress:
    # -- Namespace that runs CoreDNS (egress to :53 is allowed only here).
    dnsNamespace: kube-system
    # -- S3 (object store) reachable CIDRs on :443.
    s3Cidrs:
      - "52.216.0.0/15"
      - "16.182.0.0/16"
    # -- AWS Glue Data Catalog reachable CIDRs on :443.
    glueCidrs:
      - "10.0.0.0/8"
    # -- Hive Metastore (HMS) reachable CIDRs.
    hmsCidrs:
      - "10.0.0.0/8"
    # -- Hive Metastore port.
    hmsPort: 9083
    # -- Extra egress CIDRs (on :443) if the tenant needs more endpoints.
    extraCidrs: []

  # Hard ceiling on what a single tenant namespace may consume.
  resourceQuota:
    requestsCpu: "8"
    requestsMemory: 32Gi
    limitsCpu: "16"
    limitsMemory: 64Gi
    pods: "20"

  # Per-container defaults + caps applied inside the namespace.
  limitRange:
    defaultCpu: "1"
    defaultMemory: 2Gi
    defaultRequestCpu: 250m
    defaultRequestMemory: 512Mi
    maxCpu: "8"
    maxMemory: 32Gi

  # Worker size classes → resource requests/limits + worker replica count.
  sizeClasses:
    small:
      workerReplicas: 1
      resources:
        requests: {cpu: "1", memory: 2Gi}
        limits: {cpu: "2", memory: 4Gi}
    medium:
      workerReplicas: 2
      resources:
        requests: {cpu: "2", memory: 8Gi}
        limits: {cpu: "4", memory: 16Gi}
    large:
      workerReplicas: 4
      resources:
        requests: {cpu: "4", memory: 16Gi}
        limits: {cpu: "8", memory: 32Gi}

  # Secrets Store CSI for catalog credentials (mounted read-only, mode 0400).
  csi:
    enabled: true
    # -- CSI provider (aws | azure | gcp | vault).
    provider: aws
    # -- SecretProviderClass name created in each cluster namespace.
    secretProviderClassName: weft-catalog-creds
    # -- AWS Secrets Manager ARN holding the catalog credentials JSON.
    secretArn: "arn:aws:secretsmanager:us-west-2:123456789012:secret:weft/catalog-creds"
    # -- Path the credentials file is mounted at inside the driver.
    mountPath: /etc/weft/catalog
    # -- File name + mode of the mounted credential.
    fileName: catalog.json
    fileMode: "0400"

# Reference cluster template (templates/cluster-reference.yaml). Off by default: clusters are created
# by the gateway at runtime, not by Helm. Flip on only to inspect the exact rendered shape, e.g.:
#   helm template weft deploy/helm/weft \
#     --set clusterReference.render=true \
#     -s templates/cluster-reference.yaml
clusterReference:
  render: false
  # -- Cluster id used for the rendered namespace name (weft-cl-<id>).
  id: demo
  # -- Size class selected from cluster.sizeClasses.
  sizeClass: small
