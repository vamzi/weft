name: weft-image

# Build & publish the open-source Weft ENGINE image to Docker Hub as `vamzi/weft`.
#
# This is the `weft` binary (crate weft-cli) in a hardened distroless image. The
# control-plane gateway provisions per-user compute pods from THIS one image,
# overriding the command per role:
#     weft spark server --port 50051   -> Spark Connect driver  ("cluster")
#     weft worker       --port 50561   -> Arrow Flight worker    (same image, diff args)
# so a single `vamzi/weft` image covers both; no separate worker image is needed.
#
# Multi-arch (amd64 + arm64) built on NATIVE runners — amd64 on ubuntu-latest, arm64
# on ubuntu-24.04-arm — then merged into one manifest. No QEMU emulation, so each
# arch builds at native speed. `:latest` runs on Intel OR Graviton EKS nodes, and the
# control plane lets a user pick the arch at compute-create (pod nodeSelector).
#
# SCOPE — engine only. The proprietary control-plane GATEWAY image is built in the
# PRIVATE GitLab repo and is deliberately NOT built or published here.
#
# Repo secrets required (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME   Docker Hub account that can push to vamzi/weft (vamzi)
#   DOCKERHUB_TOKEN      Docker Hub access token with Read/Write

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deploy/docker/connect-server.Dockerfile"
      - ".github/workflows/weft-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to publish alongside latest/sha (e.g. demo, v0.1.0)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: weft-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: docker.io/vamzi/weft

jobs:
  # Build each arch on its own native runner and push BY DIGEST (no tag yet).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk (engine build is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /opt/az \
            /usr/local/lib/node_modules /usr/share/swift || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push by digest (${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/connect-server.Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          # Strip the `sha256:` prefix: the bare hash is the filename (the merge job
          # re-adds `@sha256:`), and upload-artifact@v4 rejects ':' in paths.
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Merge the per-arch digests into one multi-arch manifest under latest/sha/semver.
  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Create & push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE }}:latest" || true
          {
            echo "### Published multi-arch \`vamzi/weft\` (amd64 + arm64)"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
