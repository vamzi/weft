[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "pyweft"
version = "0.0.0"
description = "Launch a Weft Spark Connect server; then point any PySpark client at sc://localhost:50051."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Weft Labs", email = "hello@weftlabs.dev" }]
keywords = ["spark", "spark-connect", "pyspark", "arrow", "olap"]

# pyweft only *starts the server*. Users keep their stock client:
#   pip install pyspark-client
# and connect via SparkSession.builder.remote("sc://localhost:50051").
[project.optional-dependencies]
client = ["pyspark-client>=4.0"]

[project.scripts]
pyweft = "pyweft:_main"

[tool.maturin]
# TODO: build the `weft` binary (crates/weft-cli) and ship it inside the wheel,
# mirroring how pysail packages the Rust server. Until then this is a pure-Python shim.
bindings = "bin"
