# Weft CI (GitLab). See docs/architecture.md §5.
stages: [check, test, bench]

variables:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

default:
  image: rust:1-bookworm
  before_script:
    - rustup component add rustfmt clippy
  cache:
    key: cargo-$CI_COMMIT_REF_SLUG
    paths: [.cargo/, target/]

fmt:
  stage: check
  script: ["cargo fmt --all -- --check"]

clippy:
  stage: check
  script: ["cargo clippy --workspace --all-targets -- -D warnings"]

test:
  stage: test
  script: ["cargo test --workspace"]

# Local ClickBench coverage gate: all 43 queries must run through Loom on synthetic data.
clickbench-coverage:
  stage: test
  script: ["cargo run -p weft-bench -- clickbench --rows 20000"]

# Full-transport gate: all 43 queries through the live Spark Connect server over gRPC.
clickbench-grpc-coverage:
  stage: test
  script: ["cargo run -p weft-bench -- clickbench-grpc --rows 20000"]

# TPC-H subset gate: Q1/Q3/Q5/Q6/Q10 (aggregation + multi-table joins) on synthetic tables.
tpch-coverage:
  stage: test
  script: ["cargo run -p weft-bench -- tpch"]

# Correctness: gRPC/Arrow-IPC results must equal engine-direct (tie-tolerant) + ground-truth.
correctness-check:
  stage: test
  script: ["cargo run -p weft-bench -- correctness --rows 5000"]

# Spark SQL parity gate: replay Apache Spark's own golden SQL tests through weft and ratchet
# against parity/baseline.json — parity can only hold or improve, never regress. Publishes the
# scoreboard (parity.html + parity.json) and the triage report as artifacts.
spark-parity:
  stage: test
  script:
    - cargo run --release -p weft-spark-compat --bin weft-parity -- ratchet --baseline parity/baseline.json --out-dir parity
  artifacts:
    when: always
    paths: ["parity/"]
    expire_in: 30 days

# Correctness gate: run ClickBench 43 + TPC-H subset, diff results vs a Spark/DuckDB oracle.
# (Enabled once weft-loom executes queries — Phase 0.)
correctness:
  stage: test
  when: manual
  script:
    - ./bench/clickbench/run-correctness.sh
    - ./bench/tpch/run-correctness.sh

# Nightly performance gate on a self-hosted c6a.4xlarge runner; fails if total hot > Sail's.
clickbench-nightly:
  stage: bench
  tags: [c6a-4xlarge]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - ./bench/clickbench/benchmark.sh
    - ./bench/clickbench/assert-beats-sail.sh 56.3
  artifacts:
    paths: ["bench/clickbench/results/"]
    expire_in: 90 days
