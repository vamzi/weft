# cargo-deny policy for the Weft engine repo.
# Consumed by `cargo deny check` in scripts/daily-maintenance.sh.
#
# Intentionally PERMISSIVE to start: the DataFusion/Arrow/tonic tree is large and a
# strict policy would drown day one in duplicate-version and license noise. The daily
# automation tightens this over time via `chore(deps)` PRs.

[advisories]
# RUSTSEC advisory DB. Vulnerabilities and unmaintained crates are the real signal.
version = 2
yanked = "deny"
ignore = []

[licenses]
# Allow the common permissive licenses already present across the dependency tree.
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "OpenSSL",
  "bzip2-1.0.6",         # bzip2 compression dep — BSD-style permissive
  "CDLA-Permissive-2.0", # Community Data License Agreement, permissive
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are warnings, not errors — a big Arrow/DataFusion tree always has some.
multiple-versions = "warn"
wildcards = "warn"
allow = []
deny = []

[sources]
# Only crates.io and the pinned vamzi/weft git dependency are trusted sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/vamzi/weft"]
